<svg width="1200" height="120" viewBox="0 0 1200 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #090909; }
    .title { font: 800 42px Arial, sans-serif; fill: #fff; letter-spacing: 1px; }
    .accent { fill: #e31b23; }
    .code { font: 700 18px Consolas, monospace; fill: #e31b23; opacity: .7; }
    .code1 { animation: blink 1.2s infinite ease-in-out; }
    .code2 { animation: blink 1.7s infinite ease-in-out; }
    .code3 { animation: blink 2.1s infinite ease-in-out; }
    .bar {
      fill: #e31b23;
      animation: grow 2.2s infinite ease-in-out;
      transform-origin: bottom;
    }
    @keyframes blink {
      0%,100% { opacity: .18; }
      50% { opacity: .9; }
    }
    @keyframes grow {
      0%,100% { transform: scaleY(.35); opacity: .35; }
      50% { transform: scaleY(1); opacity: .9; }
    }
  </style>

  <rect class="bg" width="1200" height="120" rx="18"/>

  <text x="65" y="78" class="title">Learning in Motion</text>

  <text x="790" y="42" class="code code1">&lt;build /&gt;</text>
  <text x="910" y="68" class="code code2">{ fix: true }</text>
  <text x="790" y="94" class="code code3">git commit -m "growth"</text>

  <rect x="48" y="42" width="8" height="18" rx="4" class="bar"/>
  <rect x="48" y="66" width="8" height="35" rx="4" class="bar"/>
  <circle cx="1125" cy="35" r="5" class="accent"/>
  <circle cx="1145" cy="55" r="3" class="accent"/>
  <circle cx="1105" cy="75" r="3" class="accent"/>
</svg>
